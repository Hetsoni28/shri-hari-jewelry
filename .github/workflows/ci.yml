name: Next.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check & Lint
      run: npm run lint
      continue-on-error: true # Next.js might throw non-fatal lint warnings

    - name: Build project
      # We provide dummy Sanity env vars to ensure the build doesn't crash from missing ENVs during static generation
      env:
        NEXT_PUBLIC_SANITY_PROJECT_ID: "dummy"
        NEXT_PUBLIC_SANITY_DATASET: "production"
      run: npm run build
